        let currentIndex = 0;

        // DOM Elements
        const navList = document.getElementById('nav-list');
        const contentArea = document.getElementById('content-area');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');

        
        function renderNav() {
            navList.innerHTML = '';
            guideData.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = `nav-item w-full text-left px-4 py-2.5 rounded text-sm transition-colors duration-200 ${index === currentIndex ? 'active' : 'text-gray-400 hover:bg-gray-900 hover:text-gray-200'}`;
                
                // Truncate title slightly for sidebar if too long
                const shortTitle = item.title.length > 28 ? item.title.substring(0, 26) + '...' : item.title;
                
                btn.innerHTML = `<span class="opacity-50 mr-2 text-xs font-mono">${String(index + 1).padStart(2, '0')}</span> ${shortTitle}`;
                btn.onclick = () => {
                    loadContent(index);
                    if(window.innerWidth < 768) toggleMobileMenu();
                };
                navList.appendChild(btn);
            });
        }

        function loadContent(index) {
            // Update state
            currentIndex = index;
            
            // Re-render nav to update active state
            renderNav();

            // Animate content out/in
            contentArea.classList.remove('animate-fade-in');
            void contentArea.offsetWidth; // Trigger reflow
            contentArea.classList.add('animate-fade-in');

            const item = guideData[index];
            
            // Build content HTML
            contentArea.innerHTML = `
                <div class="mb-2 flex items-center gap-3">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-gray-900 border border-gray-800 text-xs font-mono text-gray-400">
                        ${index + 1}
                    </span>
                    <span class="text-gray-500 text-sm font-medium tracking-wide uppercase">Principio</span>
                </div>
                <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-white mb-4 leading-tight">${item.title}</h1>
                <h2 class="text-xl md:text-2xl text-gray-400 font-light mb-12 tracking-tight leading-snug">${item.description}</h2>
                <div class="prose prose-invert prose-p:text-gray-400 prose-p:leading-relaxed max-w-none">
                    ${item.content}
                </div>
            `;

            // Update navigation buttons
            btnPrev.classList.toggle('invisible', currentIndex === 0);
            btnNext.classList.toggle('invisible', currentIndex === guideData.length - 1);

            // Scroll to top of content
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        
        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) loadContent(currentIndex - 1);
        });

        btnNext.addEventListener('click', () => {
            if (currentIndex < guideData.length - 1) loadContent(currentIndex + 1);
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                if (currentIndex < guideData.length - 1) loadContent(currentIndex + 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (currentIndex > 0) loadContent(currentIndex - 1);
            }
        });

        // Mobile menu toggle
        function toggleMobileMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                mobileOverlay.classList.remove('hidden');
                setTimeout(() => mobileOverlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                mobileOverlay.classList.remove('opacity-100');
                setTimeout(() => mobileOverlay.classList.add('hidden'), 300);
            }
        }

        mobileMenuBtn.addEventListener('click', toggleMobileMenu);
        mobileOverlay.addEventListener('click', toggleMobileMenu);

        // Copy to clipboard utility
        function copyText(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            const textToCopy = el.innerText || el.textContent;
            
            // Fallback for iFrames or environments where navigator.clipboard might fail
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed';
            textarea.style.opacity = 0;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Failed to copy', err);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 2000);
        }

        // Initialize App
        loadContent(0);

    </script>
